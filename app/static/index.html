<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Video Search</title>
    <meta name="description" content="AI-powered semantic search across your videos using natural language.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color)), var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 30px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* File Upload Area */
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .file-upload-area:hover, .file-upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .file-upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Status & Results */
        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            font-size: 0.95rem;
            display: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .result-score {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-time {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 5px;
        }

        .result-video {
            color: var(--text-muted);
            font-size: 0.9rem;
            word-break: break-all;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Semantic Video Search</h1>
            <p class="subtitle">Find exact moments in your videos using natural language</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Search Videos</button>
            <button class="tab-btn" onclick="switchTab('upload')">📤 Upload & Index</button>
        </div>

        <!-- SEARCH TAB -->
        <div id="search-tab" class="tab-content active">
            <form id="search-form" onsubmit="handleSearch(event)">
                <div class="form-group">
                    <label for="search-query">What are you looking for?</label>
                    <input type="text" id="search-query" placeholder="e.g., A cat playing with a red ball" required>
                </div>
                <div class="form-group">
                    <label for="search-user">User ID (Your Namespace)</label>
                    <input type="text" id="search-user" placeholder="e.g., my_user_123" value="default_user" required>
                </div>
                <button type="submit" class="btn" id="search-btn">
                    <span class="loader" id="search-loader"></span>
                    Search
                </button>
            </form>

            <div id="search-results" class="results-grid"></div>
        </div>

        <!-- UPLOAD TAB -->
        <div id="upload-tab" class="tab-content">
            <form id="upload-form" onsubmit="handleUpload(event)">
                <div class="form-group">
                    <label for="upload-user">User ID (Your Namespace)</label>
                    <input type="text" id="upload-user" placeholder="e.g., my_user_123" value="default_user" required>
                </div>
                
                <div class="file-upload-area" id="drop-area" onclick="document.getElementById('file-input').click()">
                    <span class="upload-icon">📁</span>
                    <h3>Drag & Drop your videos here</h3>
                    <p class="subtitle">or click to browse files</p>
                    <input type="file" id="file-input" multiple accept="video/*" onchange="updateFileList()">
                </div>
                <div id="file-list" style="margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem;"></div>

                <button type="submit" class="btn" id="upload-btn">
                    <span class="loader" id="upload-loader"></span>
                    Upload & Index
                </button>
            </form>

            <div id="upload-status" class="status-box"></div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`${tabId}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // --- File Upload UI Logic ---
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            fileInput.files = files;
            updateFileList();
        });

        function updateFileList() {
            const list = document.getElementById('file-list');
            if (fileInput.files.length > 0) {
                list.innerHTML = `Selected ${fileInput.files.length} file(s): <br>` + 
                    Array.from(fileInput.files).map(f => `• ${f.name}`).join('<br>');
            } else {
                list.innerHTML = '';
            }
        }

        // --- API Interactions ---

        async function handleSearch(e) {
            e.preventDefault();
            const query = document.getElementById('search-query').value;
            const userId = document.getElementById('search-user').value;
            const btn = document.getElementById('search-btn');
            const loader = document.getElementById('search-loader');
            const resultsDiv = document.getElementById('search-results');

            btn.disabled = true;
            loader.style.display = 'inline-block';
            resultsDiv.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('query', query);
                formData.append('user_id', userId);
                formData.append('limit', 10);

                const res = await fetch('/api/v1/search', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    if (data.length === 0) {
                        resultsDiv.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center;">No matching moments found.</p>';
                    } else {
                        data.forEach(item => {
                            resultsDiv.innerHTML += `
                                <div class="result-card">
                                    <div class="result-score">Score: ${(item.score * 100).toFixed(1)}%</div>
                                    <div class="result-time">${formatTime(item.timestamp)}</div>
                                    <div class="result-video">${item.video_id}</div>
                                </div>
                            `;
                        });
                    }
                } else {
                    alert(`Error: ${data.detail || 'Something went wrong'}`);
                }
            } catch (err) {
                alert(`Network error: ${err.message}`);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        async function handleUpload(e) {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert("Please select at least one video file.");
                return;
            }

            const userId = document.getElementById('upload-user').value;
            const btn = document.getElementById('upload-btn');
            const loader = document.getElementById('upload-loader');
            const statusBox = document.getElementById('upload-status');

            btn.disabled = true;
            loader.style.display = 'inline-block';
            statusBox.style.display = 'block';
            statusBox.innerHTML = 'Uploading files...';

            try {
                const formData = new FormData();
                formData.append('user_id', userId);
                Array.from(fileInput.files).forEach(file => {
                    formData.append('files', file);
                });

                const res = await fetch('/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    statusBox.innerHTML = `
                        <strong style="color: #4ade80;">Upload Successful!</strong><br>
                        Processing has started in the background.<br>
                        Task IDs: <br> ${data.tasks.map(t => `• ${t.task_id}`).join('<br>')}
                    `;
                    // You could add polling here to hit /api/v1/status/{task_id}
                } else {
                    statusBox.innerHTML = `<span style="color: #f87171;">Error: ${data.detail || 'Upload failed'}</span>`;
                }
            } catch (err) {
                statusBox.innerHTML = `<span style="color: #f87171;">Network error: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                fileInput.value = '';
                updateFileList();
            }
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = (seconds % 60).toFixed(1);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.padStart(4, '0')}`;
            return `${m}:${s.padStart(4, '0')}`;
        }
    </script>
</body>
</html>
